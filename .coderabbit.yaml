# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*"
      instructions: |
        Enforce ADR compliance for all code changes.

        Review requirements:
        1) Read all accepted ADRs in doc/adr/*.md before reviewing changed files.
        2) Verify the pull request implementation is consistent with those ADR decisions.
        3) If a change conflicts with an accepted ADR, request changes and clearly cite the conflicting ADR file(s).
        4) If no ADR exists for a significant new architectural direction, suggest adding a new ADR in doc/adr/.
        5) Do not review generated Flutter platform code in pallas_app/ios/, pallas_app/android/, pallas_app/linux/, pallas_app/macos/, pallas_app/web/, or pallas_app/windows/.

        Lefthook review requirements:
        1) Verify lefthook is used as the execution entrypoint for linting and formatting.
        2) Verify every text-based file type present in the repository has both linting and formatting coverage in lefthook configuration, except repository ignore files.
        3) If a PR introduces a new text-based file type, require lefthook updates in the same PR to add suitable linter and formatter tooling.
        4) Exception: repository ignore files (for example .gitignore) must be formatted but do not require a dedicated lint tool.
        5) Verify binary files (for example images) are excluded from lint/format requirements.

        Focus on actionable comments tied to specific ADR decisions.
    - path: "doc/adr/*.md"
      instructions: |
        For ADR changes:
        - Verify the ADR follows the existing repository ADR format.
        - Check that Context, Decision, and Consequences are clear and consistent.
        - Ensure any ADR that supersedes or changes prior decisions explains migration or impact.
