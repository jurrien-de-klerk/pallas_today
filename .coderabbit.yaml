# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!pallas_app/packages/openapi/**"
  path_instructions:
    - path: "**/*"
      instructions: |
        Enforce ADR compliance for all code changes.

        Review requirements:
        1) Read all accepted ADRs in doc/adr/*.md before reviewing changed files.
        2) Verify the pull request implementation is consistent with those ADR decisions.
        3) If a change conflicts with an accepted ADR, request changes and clearly cite the conflicting ADR file(s).
        4) If no ADR exists for a significant new architectural direction, suggest adding a new ADR in doc/adr/.
        5) Do not review generated Flutter platform code in pallas_app/ios/, pallas_app/android/, pallas_app/linux/, pallas_app/macos/, pallas_app/web/, or pallas_app/windows/.
        6) Do not review generated Dart client code in pallas_app/packages/openapi/. This code is auto-generated from OpenAPI specs in api-specs/ and must not be manually edited or reviewed.

        Lefthook review requirements:
        1) Verify lefthook is used as the execution entrypoint for linting and formatting.
        2) Verify every text-based file type present in the repository has both linting and formatting coverage in lefthook configuration, except repository ignore files.
        3) If a PR introduces a new text-based file type, require lefthook updates in the same PR to add suitable linter and formatter tooling.
        4) Exception: repository ignore files (for example .gitignore) must be formatted but do not require a dedicated lint tool.
        5) Verify binary files (for example images) are excluded from lint/format requirements.

        Focus on actionable comments tied to specific ADR decisions.

        Scope review requirements:
        1) Read the pull request description before reviewing any file.
        2) Extract the declared scope from the "Original scope" section of the PR description:
           the "In scope" items define what this PR is expected to change, and the "Out of scope"
           items define what it must not change.
        3) For each changed file, verify the change is covered by an in-scope item.
        4) Flag any changes that fall outside the declared in-scope items as scope violations and
           suggest they are moved to a separate issue.
        5) Flag any in-scope items that are not addressed by any change in the PR.
        6) The developer is allowed to adjust the scope of the PR by filling in the "Scope changes"
           section of the PR description. Items listed there are agreed deviations from the original
           issue scope: added items extend the in-scope set, and removed items reduce it. Treat the
           effective scope as the original in-scope items plus any additions minus any removals stated
           in "Scope changes". Do not raise violations for changes that are covered by this adjusted
           scope.
        7) Report scope findings under a "Scope issues" heading. If there are no scope issues,
           omit the heading.
    - path: "doc/adr/*.md"
      instructions: |
        For ADR changes:
        - Verify the ADR follows the existing repository ADR format.
        - Check that Context, Decision, and Consequences are clear and consistent.
        - Ensure any ADR that supersedes or changes prior decisions explains migration or impact.
