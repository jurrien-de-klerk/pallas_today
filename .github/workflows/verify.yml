---
name: Verify
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
jobs:
  lint:
    name: Lint (lefthook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lefthook
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/evilmartians/lefthook/setup.deb.sh' | sudo -E bash
          sudo apt-get install -y lefthook
      - name: Run lefthook on all files
        run: lefthook run pre-commit --all-files
  maven-verify:
    name: Maven verify (no tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Verify (skip tests, skip auto-format — check only)
        run: mvn --batch-mode verify -DskipTests -Dfmt.format.skip=true
        working-directory: pallas_server
