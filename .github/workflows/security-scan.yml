---
name: Security Scan
on:
  schedule:
    - cron: "0 17 * * 5" # Every Friday at 17:00 UTC (19:00 CEST)
  workflow_dispatch:
jobs:
  scan-java:
    name: Java dependency scan (OWASP)
    runs-on: ubuntu-latest
    outputs:
      vulnerable: ${{ steps.scan.outputs.vulnerable }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run OWASP dependency-check
        id: scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set +e
          mvn --batch-mode dependency-check:aggregate \
            -Ddependency-check.skip=false \
            -DnvdApiKey="${NVD_API_KEY}" \
            -DfailBuildOnCVSS=7.0 \
            -Dformat=JSON
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: pallas_server
      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: pallas_server/target/dependency-check-report.json
          if-no-files-found: ignore
  scan-dart:
    name: Dart dependency audit
    runs-on: ubuntu-latest
    container: ghcr.io/cirruslabs/flutter:stable
    outputs:
      vulnerable: ${{ steps.scan.outputs.vulnerable }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Install dependencies
        run: flutter pub get
        working-directory: pallas_app
      - name: Run pub audit
        id: scan
        run: |
          set +e
          dart pub audit --json > /tmp/dart-audit.json 2>/tmp/dart-audit-err.log
          EXIT=$?
          cat /tmp/dart-audit.json
          if [ $EXIT -ne 0 ]; then
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: pallas_app
      - name: Upload Dart audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-audit
          path: /tmp/dart-audit.json
          if-no-files-found: ignore
  remediate:
    name: AI remediation
    needs:
      - scan-java
      - scan-dart
    if: needs.scan-java.outputs.vulnerable == 'true' || needs.scan-dart.outputs.vulnerable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/scan-results
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install openai
      - name: Run AI remediation agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVA_VULN: ${{ needs.scan-java.outputs.vulnerable }}
          DART_VULN: ${{ needs.scan-dart.outputs.vulnerable }}
        run: |
          python .github/scripts/ai_remediate.py \
            --owasp-report /tmp/scan-results/owasp-report/dependency-check-report.json \
            --dart-audit /tmp/scan-results/dart-audit/dart-audit.json \
            --java-vuln "${JAVA_VULN}" \
            --dart-vuln "${DART_VULN}"
      - name: Check for file changes
        id: git_diff
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            git diff --name-only
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes were produced by the AI agent."
          fi
      - name: Create pull request
        if: steps.git_diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(security): bump vulnerable dependencies [AI-generated]"
          branch: security/auto-fix-${{ github.run_number }}
          title: "fix(security): AI-generated dependency security fixes"
          body: |
            ## Security vulnerability auto-fix

            This PR was automatically generated by the weekly security scan
            (run [#${{ github.run_number }}](${{ github.server_url }}\
            /${{ github.repository }}/actions/runs/${{ github.run_id }})).

            ### Vulnerabilities detected

            | Stack | Vulnerable |
            |-------|------------|
            | Java (OWASP) | ${{ needs.scan-java.outputs.vulnerable }} |
            | Dart (pub audit) | ${{ needs.scan-dart.outputs.vulnerable }} |

            ### What the agent did

            Dependency versions in `pom.xml` and/or `pubspec.yaml` have been bumped
            to resolve known CVEs as suggested by the AI remediation agent.

            ---

            > ⚠️ **Review required** — verify all version changes before merging.
            > Run `lefthook run pre-commit` locally to confirm all hooks pass.
          labels: |
            security
            dependencies
            ai-generated
