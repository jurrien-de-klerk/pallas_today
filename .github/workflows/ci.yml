---
name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
jobs:
  flutter:
    name: Flutter (pallas_app)
    runs-on: ubuntu-latest
    container: ghcr.io/cirruslabs/flutter:stable
    steps:
      - uses: actions/checkout@v4
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml', '**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Install dependencies (pallas_app)
        run: flutter pub get
        working-directory: pallas_app
      - name: Install dependencies (pallas_logger)
        run: flutter pub get
        working-directory: pallas_app/packages/pallas_logger
      - name: Install dependencies (openapi)
        run: flutter pub get
        working-directory: pallas_app/packages/openapi
      - name: Analyse
        run: flutter analyze
        working-directory: pallas_app
      - name: Test (pallas_app)
        run: flutter test
        working-directory: pallas_app
      - name: Test (pallas_logger)
        run: flutter test
        working-directory: pallas_app/packages/pallas_logger
      - name: Test (openapi)
        run: flutter test
        working-directory: pallas_app/packages/openapi
  java:
    name: Java (pallas_server)
    runs-on: ubuntu-latest
    container: maven:3.9.15-eclipse-temurin-21
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Verify and test
        run: mvn --batch-mode verify -Dfmt.format.skip=true
        working-directory: pallas_server
