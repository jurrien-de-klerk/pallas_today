---
name: CI
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
jobs:
  maven-verify:
    name: Maven verify (no tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Verify (skip tests, skip auto-format — check only)
        run: mvn --batch-mode verify -DskipTests -Dfmt.format.skip=true
        working-directory: pallas_server
  flutter-test:
    name: Flutter tests (pallas_app)
    runs-on: ubuntu-latest
    needs:
      - maven-verify
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
        working-directory: pallas_app
      - name: Run tests
        run: flutter test
        working-directory: pallas_app
  maven-test:
    name: Maven tests (pallas_server)
    runs-on: ubuntu-latest
    needs:
      - maven-verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Run tests
        run: mvn --batch-mode test -Dfmt.format.skip=true
        working-directory: pallas_server
