---
openapi: 3.0.3
info:
  title: ImageService API
  description: API for managing images belonging to stories
  version: 0.0.1-SNAPSHOT
  contact:
    name: Pallas Team
servers:
  - url: http://localhost:8081
    description: Local development server
security:
  - oauth2: []
paths:
  /images/story/{storyId}:
    post:
      summary: Upload an image for a story
      description: Upload a new image and associate it with the specified story.
      operationId: addImage
      tags:
        - images
      parameters:
        - name: storyId
          in: path
          description: The ID of the story that owns this image
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: >-
                    The image file to upload. Supported formats: JPEG, PNG, WebP.
                    Maximum file size: 10 MB.
      responses:
        '201':
          description: Image uploaded successfully
          headers:
            Location:
              description: URI of the uploaded image
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Story not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '415':
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /images/story/{storyId}/{imageId}:
    get:
      summary: Get an image
      description: Download the image file belonging to the specified story.
      operationId: getImage
      tags:
        - images
      parameters:
        - name: storyId
          in: path
          description: The ID of the story that owns this image
          required: true
          schema:
            type: string
            format: uuid
        - name: imageId
          in: path
          description: The ID of the image to download
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Image file
          headers:
            Content-Type:
              description: MIME type of the image (image/jpeg, image/png or image/webp)
              schema:
                type: string
            Content-Length:
              description: File size in bytes
              schema:
                type: integer
                format: int64
            Content-Disposition:
              description: Suggested filename for the downloaded file
              schema:
                type: string
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        '404':
          description: Story or image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Remove an image
      description: Delete an image belonging to the specified story from file storage.
      operationId: removeImage
      tags:
        - images
      parameters:
        - name: storyId
          in: path
          description: The ID of the story that owns this image
          required: true
          schema:
            type: string
            format: uuid
        - name: imageId
          in: path
          description: The ID of the image to delete
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Image deleted successfully
        '404':
          description: Story or image not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        password:
          tokenUrl: http://localhost:8180/realms/pallas/protocol/openid-connect/token
          scopes: {}
  schemas:
    Image:
      type: object
      required:
        - id
        - storyId
        - storageUrl
        - contentType
        - sizeBytes
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the image
          example: 123e4567-e89b-12d3-a456-426614174001
        storyId:
          type: string
          format: uuid
          description: The ID of the story this image belongs to
          example: 123e4567-e89b-12d3-a456-426614174000
        storageUrl:
          type: string
          format: uri
          description: The URL at which the image can be accessed
          maxLength: 2048
          example: https://storage.example.com/images/123e4567-e89b-12d3-a456-426614174001.jpg
        contentType:
          type: string
          description: MIME type of the image
          maxLength: 64
          enum:
            - image/jpeg
            - image/png
            - image/webp
          example: image/jpeg
        sizeBytes:
          type: integer
          format: int64
          description: File size in bytes
          minimum: 1
          maximum: 10485760
          example: 204800
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message
          maxLength: 256
        code:
          type: string
          description: Error code
          maxLength: 64
        details:
          type: string
          description: Additional error details
          maxLength: 1024
