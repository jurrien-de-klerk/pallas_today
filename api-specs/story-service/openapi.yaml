---
openapi: 3.0.3
info:
  title: StoryService API
  description: CRUD API for managing stories
  version: 0.0.1-SNAPSHOT
  contact:
    name: Pallas Team
servers:
  - url: http://localhost:8080
    description: Local development server
security:
  - oauth2: []
paths:
  /stories:
    get:
      summary: List all stories
      description: Retrieve a list of all stories
      operationId: listStories
      tags:
        - stories
      parameters:
        - name: limit
          in: query
          description: Maximum number of stories to return
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Number of stories to skip
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  stories:
                    type: array
                    maxItems: 100
                    items:
                      $ref: '#/components/schemas/Story'
                  total:
                    type: integer
                    description: Total number of stories
                  limit:
                    type: integer
                  offset:
                    type: integer
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a new story
      description: Create a new story with the provided content
      operationId: createStory
      tags:
        - stories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryInput'
      responses:
        '201':
          description: Story created successfully
          headers:
            Location:
              description: URI of the created story
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /stories/{id}:
    get:
      summary: Get a story by ID
      description: Retrieve a specific story by its unique identifier
      operationId: getStory
      tags:
        - stories
      parameters:
        - name: id
          in: path
          description: Story ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
        '404':
          description: Story not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: Update a story
      description: Update an existing story with new content
      operationId: updateStory
      tags:
        - stories
      parameters:
        - name: id
          in: path
          description: Story ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoryInput'
      responses:
        '200':
          description: Story updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Story not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a story
      description: Delete a specific story by its unique identifier
      operationId: deleteStory
      tags:
        - stories
      parameters:
        - name: id
          in: path
          description: Story ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Story deleted successfully
        '404':
          description: Story not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        password:
          tokenUrl: http://localhost:8180/realms/pallas/protocol/openid-connect/token
          scopes: {}
  schemas:
    Story:
      type: object
      required:
        - id
        - story
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the story
          example: 123e4567-e89b-12d3-a456-426614174000
        story:
          type: string
          description: The story content as a Quill Delta JSON string (JSON-serialised array of Delta ops).
          example: '[{"insert":"Once upon a time...\n"}]'
    StoryInput:
      type: object
      required:
        - story
      properties:
        story:
          type: string
          description: The story content as a Quill Delta JSON string (JSON-serialised array of Delta ops).
          minLength: 1
          maxLength: 100000
          example: '[{"insert":"Once upon a time...\n"}]'
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message
        code:
          type: string
          description: Error code
        details:
          type: string
          description: Additional error details
