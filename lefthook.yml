pre-commit:
  parallel: false
  exclude:
    - "*.lock"
    - "**/*.lock"
    - ".metadata"
    - "**/.metadata"
    - "**/ios/**"
    - "**/android/**"
    - "**/linux/**"
    - "**/macos/**"
    - "**/web/**"
    - "**/windows/**"
  jobs:
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project letompouce/mdformat:e424a94a
        {staged_files}
      glob: "**/*.md"
      stage_fixed: true
      name: Markdown formatter
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project markdownlint/markdownlint:0.15.0
        --config /project/tool_config/markdownlint-config.rb {staged_files}
      glob: "**/*.md"
      name: Markdown lint
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project livewyer/yamlfmt:0.13 -conf /project/tool_config/yamlfmt-config.yml
        {staged_files}
      glob: "**/*.{yml,yaml}"
      stage_fixed: true
      name: YAML formatter
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project cytopia/yamllint:alpine -c /project/tool_config/ymllint-config.yml
        {staged_files}
      glob: "**/*.{yml,yaml}"
      name: YAML lint
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pipelinecomponents/xmllint xmllint --format {staged_files}
      glob: "**/*.xml"
      stage_fixed: true
      name: XML formatter
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pipelinecomponents/xmllint xmllint {staged_files}
      glob: "**/*.xml"
      name: XML lint
    - run: >-
        cd pallas_app && dart format $(echo {staged_files} | sed 's|pallas_app/||g')
      glob: "pallas_app/**/*.dart"
      stage_fixed: true
      name: Dart formatter
    - run: >-
        cd pallas_app && flutter analyze $(echo {staged_files} | sed 's|pallas_app/||g')
      glob: "pallas_app/**/*.dart"
      name: Dart lint
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project eclipse-temurin:21-jdk sh -lc
        "curl -fsSL -o /tmp/google-java-format.jar https://repo1.maven.org/maven2/com/google/googlejavaformat/google-java-format/1.24.0/google-java-format-1.24.0-all-deps.jar
        && java -jar /tmp/google-java-format.jar --replace {staged_files}"
      glob: "**/*.java"
      stage_fixed: true
      name: Java formatter
    - run: >
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project maven:3-eclipse-temurin-21
        mvn -q checkstyle:check -DskipTests
      glob: "pallas_server/StoryService/**/*.java"
      name: Checkstyle
    - run: >
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project maven:3-eclipse-temurin-21
        mvn -q compile spotbugs:check -DskipTests
      glob: "pallas_server/StoryService/**/*.java"
      name: SpotBugs
    - run: >
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project maven:3-eclipse-temurin-21
        mvn -q pmd:check -DskipTests
      glob: "pallas_server/StoryService/**/*.java"
      name: PMD