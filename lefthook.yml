pre-commit:
  parallel: false
  jobs:
    - run: >-
        docker run -it --rm ubuntu echo {staged_files}
      glob: "*.md"
      stage_fixed: true
      name: File name printer
    - run: >-
        docker run -it --rm --volume $(pwd):/project --workdir /project letompouce/mdformat:e424a94a {staged_files} --check
      glob: "*.md"
      stage_fixed: true
      name: Markdown formatter
    - run: >-
        docker run -it --rm --volume $(pwd):/project --workdir /project markdownlint/markdownlint:0.15.0 {staged_files}
      glob: "*.md"
      name: Markdown lint
    - run: >-
        docker run -it --rm --volume $(pwd):/project --workdir /project livewyer/yamlfmt:0.13 -conf /project/tool_config/yamlfmt-config.yml
        {staged_files}
      glob: "*.yml"
      stage_fixed: true
      name: YAML formatter
    - run: >-
        docker run -it --rm --volume $(pwd):/project --workdir /project cytopia/yamllint:alpine -c /project/tool_config/ymllint-config.yml
        {staged_files}
      glob: "*.yml"
      name: YAML lint
