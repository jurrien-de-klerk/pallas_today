pre-commit:
  parallel: false
  exclude:
    - "*.lock"
    - "**/*.lock"
    - ".metadata"
    - "**/.metadata"
    - "**/ios/**"
    - "**/android/**"
    - "**/linux/**"
    - "**/macos/**"
    - "**/web/**"
    - "**/windows/**"
    - "pallas_app/packages/openapi/**"
  jobs:
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        mdformat --wrap 120 {staged_files}
      glob: "**/*.md"
      exclude:
        - ".github/ISSUE_TEMPLATE/**"
      stage_fixed: true
      name: Markdown-formatter
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        markdownlint-cli2 --config /project/tool_config/lefthook/markdownlint-config.json {staged_files}
      glob: "**/*.md"
      exclude:
        - ".github/ISSUE_TEMPLATE/**"
      name: Markdown lint
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        yamlfmt -conf /project/tool_config/lefthook/yamlfmt-config.yml {staged_files}
      glob: "**/*.{yml,yaml}"
      stage_fixed: true
      name: YAML formatter
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        yamllint --strict -c /project/tool_config/lefthook/ymllint-config.yml {staged_files}
      glob: "**/*.{yml,yaml}"
      name: YAML lint
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        sh -c 'for file in {staged_files}; do xmllint --format "$file" --output "$file"; done'
      glob: "**/*.xml"
      stage_fixed: true
      name: XML formatter
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        xmllint {staged_files}
      glob: "**/*.xml"
      name: XML lint
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        sh -c 'for file in {staged_files}; do jq . "$file" > /tmp/_jq.json && mv /tmp/_jq.json "$file"; done'
      glob: "**/*.json"
      stage_fixed: true
      name: JSON formatter
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        sh -c 'for file in {staged_files}; do jsonlint "$file"; done'
      glob: "**/*.json"
      name: JSON lint
    - run: >-
        cd pallas_app && dart format $(echo {staged_files} | sed 's|pallas_app/||g')
      glob: "pallas_app/**/*.dart"
      stage_fixed: true
      name: Dart formatter
    - run: >-
        cd pallas_app && flutter analyze $(echo {staged_files} | sed 's|pallas_app/||g')
      glob: "pallas_app/**/*.dart"
      name: Dart lint
    # Note: Removed Maven-based pre-commit hooks (Java formatting, Checkstyle, SpotBugs, PMD)
    # These are now run during the local Maven build: mvn clean verify
    # This happens before Docker image build, and developers run Maven locally anyway
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        sh -c 'for file in {staged_files}; do dockerfmt --write "$file"; done'
      glob: "**/Dockerfile"
      stage_fixed: true
      name: Dockerfile formatter
    - run: >-
        docker run --rm --user $(id -u):$(id -g) --volume $(pwd):/project --workdir /project pallas.today/commit-hook-tool
        hadolint {staged_files}
      glob: "**/Dockerfile"
      name: Dockerfile lint
    - run: cd pallas_app && dart run build_runner build --delete-conflicting-outputs
      glob:
        - "api-specs/*.yaml"
        - "api-specs/**/*.yaml"
        - "pallas_app/packages/openapi/**"
      name: Dart client codegen
    - run: >-
        if ! git diff --quiet -- pallas_app/packages/openapi/; then
        echo "ERROR: Dart client codegen produced changes in pallas_app/packages/openapi/.
        Review the diff with: git diff pallas_app/packages/openapi/
        If the changes are expected, stage them and retry the commit.
        See copilot-instructions.md for the review workflow." >&2; exit 1; fi
      glob:
        - "api-specs/*.yaml"
        - "api-specs/**/*.yaml"
        - "pallas_app/packages/openapi/**"
      name: Dart client codegen guard