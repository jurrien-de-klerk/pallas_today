# Server configuration
server.port=8081

# Keycloak / OAuth2 resource server
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/pallas/protocol/openid-connect/certs}
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8180}
keycloak.realm=${KEYCLOAK_REALM:pallas}
keycloak.admin-client-id=${KEYCLOAK_ADMIN_CLIENT_ID:member-service}
keycloak.admin-client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:changeme}

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/memberservice}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:memberservice}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:memberservice}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JPA — let Flyway manage the schema; Hibernate must not auto-create/drop tables
spring.jpa.hibernate.ddl-auto=validate

# Actuator: expose only the health endpoint; all others are disabled
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# OpenAPI/Swagger UI configuration
# Disabled by default; enabled only in the dev profile (application-dev.properties)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
