---
services:
  keycloak-db:
    image: postgres:17
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    networks:
      - keycloak-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 2s
      timeout: 5s
      retries: 25
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --health-enabled=true --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - keycloak-internal
      - services
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - exec 3<>/dev/tcp/localhost/9000;printf 'GET /health/ready HTTP/1.0\r\n\r\n'>&3;grep -q UP <&3
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
  story-service:
    build:
      context: ./StoryService
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/pallas/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://localhost:8180
      KEYCLOAK_REALM: pallas
      SPRING_PROFILES_ACTIVE: dev
    networks:
      - services
    depends_on:
      keycloak:
        condition: service_healthy
  member-service:
    build:
      context: ./MemberService
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/pallas/protocol/openid-connect/certs
      KEYCLOAK_AUTH_SERVER_URL: http://localhost:8180
      KEYCLOAK_REALM: pallas
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://member-db:5432/memberservice
      SPRING_DATASOURCE_USERNAME: memberservice
      SPRING_DATASOURCE_PASSWORD: memberservice
    networks:
      - services
      - member-internal
    depends_on:
      keycloak:
        condition: service_healthy
      member-db:
        condition: service_healthy
  member-db:
    image: postgres:17
    environment:
      POSTGRES_DB: memberservice
      POSTGRES_USER: memberservice
      POSTGRES_PASSWORD: memberservice
    networks:
      - member-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memberservice -d memberservice"]
      interval: 2s
      timeout: 5s
      retries: 25
networks:
  keycloak-internal:
    driver: bridge
    internal: true
  member-internal:
    driver: bridge
    internal: true
  services:
    driver: bridge
